<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <radialGradient id="bg-spot2" cx="0.2" cy="0.7" r="0.6">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="700" fill="#0a0a0a"/>
  <rect width="1200" height="700" fill="url(#bg-spot2)"/>
  
  <!-- Title -->
  <line x1="80" y1="80" x2="112" y2="80" stroke="#c9a96e" stroke-width="1"/>
  <text x="128" y="84" font-family="monospace" font-size="11" fill="#c9a96e" letter-spacing="3">WORDPRESS THEME STRUCTURE</text>
  
  <text x="80" y="130" font-family="serif" font-size="36" fill="#e8e6e1" letter-spacing="-0.5">noir-clinic/</text>
  <text x="80" y="158" font-family="serif" font-style="italic" font-size="16" fill="#7a7770">Original Theme · Designed for Self-Management</text>
  
  <!-- ============ Tree structure ============ -->
  <g transform="translate(100, 220)" font-family="monospace" font-size="13" fill="#e8e6e1">
    
    <!-- Root files column -->
    <g transform="translate(0, 0)">
      <text x="0" y="0" font-size="10" fill="#c9a96e" letter-spacing="2">CORE FILES</text>
      
      <g transform="translate(0, 30)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1">style.css</text>
        <text x="115" y="1" font-size="9" fill="#7a7770">/* theme info */</text>
      </g>
      <g transform="translate(0, 60)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1">functions.php</text>
        <text x="115" y="1" font-size="9" fill="#7a7770">/* hooks */</text>
      </g>
      <g transform="translate(0, 90)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1">header.php</text>
      </g>
      <g transform="translate(0, 120)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1">footer.php</text>
      </g>
      <g transform="translate(0, 150)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1">front-page.php</text>
      </g>
    </g>
    
    <!-- Page templates column -->
    <g transform="translate(280, 0)">
      <text x="0" y="0" font-size="10" fill="#c9a96e" letter-spacing="2">PAGE TEMPLATES</text>
      
      <g transform="translate(0, 30)">
        <rect x="0" y="-14" width="220" height="22" rx="3" fill="rgba(201,169,110,0.05)" stroke="rgba(201,169,110,0.18)" stroke-width="0.5"/>
        <text x="10" y="1">page-menu.php</text>
        <text x="135" y="1" font-size="9" fill="#c9a96e">施術メニュー</text>
      </g>
      <g transform="translate(0, 60)">
        <rect x="0" y="-14" width="220" height="22" rx="3" fill="rgba(201,169,110,0.05)" stroke="rgba(201,169,110,0.18)" stroke-width="0.5"/>
        <text x="10" y="1">page-cases.php</text>
        <text x="135" y="1" font-size="9" fill="#c9a96e">症例一覧</text>
      </g>
      <g transform="translate(0, 90)">
        <rect x="0" y="-14" width="220" height="22" rx="3" fill="rgba(201,169,110,0.05)" stroke="rgba(201,169,110,0.18)" stroke-width="0.5"/>
        <text x="10" y="1">page-reservation.php</text>
        <text x="160" y="1" font-size="9" fill="#c9a96e">予約</text>
      </g>
      <g transform="translate(0, 120)">
        <rect x="0" y="-14" width="220" height="22" rx="3" fill="rgba(201,169,110,0.05)" stroke="rgba(201,169,110,0.18)" stroke-width="0.5"/>
        <text x="10" y="1">page-faq.php</text>
        <text x="135" y="1" font-size="9" fill="#c9a96e">FAQ</text>
      </g>
      <g transform="translate(0, 150)">
        <rect x="0" y="-14" width="220" height="22" rx="3" fill="rgba(201,169,110,0.05)" stroke="rgba(201,169,110,0.18)" stroke-width="0.5"/>
        <text x="10" y="1">page-access.php</text>
        <text x="135" y="1" font-size="9" fill="#c9a96e">アクセス</text>
      </g>
    </g>
    
    <!-- template-parts column -->
    <g transform="translate(580, 0)">
      <text x="0" y="0" font-size="10" fill="#c9a96e" letter-spacing="2">TEMPLATE PARTS</text>
      <text x="0" y="14" font-size="9" fill="#7a7770">/template-parts/</text>
      
      <g transform="translate(0, 38)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">part-hero.php</text>
      </g>
      <g transform="translate(0, 68)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">part-menu-card.php</text>
      </g>
      <g transform="translate(0, 98)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">part-case-card.php</text>
      </g>
      <g transform="translate(0, 128)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">part-doctor.php</text>
      </g>
      <g transform="translate(0, 158)">
        <rect x="0" y="-14" width="200" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">part-cta.php</text>
      </g>
    </g>
    
    <!-- Assets column -->
    <g transform="translate(860, 0)">
      <text x="0" y="0" font-size="10" fill="#c9a96e" letter-spacing="2">ASSETS</text>
      <text x="0" y="14" font-size="9" fill="#7a7770">/assets/</text>
      
      <g transform="translate(0, 38)">
        <rect x="0" y="-14" width="160" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">/css</text>
      </g>
      <g transform="translate(0, 68)">
        <rect x="0" y="-14" width="160" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">/js</text>
      </g>
      <g transform="translate(0, 98)">
        <rect x="0" y="-14" width="160" height="22" rx="3" fill="rgba(255,255,255,0.03)" stroke="rgba(232,230,225,0.08)" stroke-width="0.5"/>
        <text x="10" y="1" font-size="12">/images</text>
      </g>
    </g>
  </g>
  
  <!-- Bottom notes -->
  <g transform="translate(100, 500)" font-family="sans-serif" font-size="12" fill="#b8b5ad">
    <line x1="0" y1="0" x2="1000" y2="0" stroke="rgba(232,230,225,0.08)" stroke-width="1"/>
    <text x="0" y="30" font-family="monospace" font-size="10" fill="#c9a96e" letter-spacing="2">RUNTIME DESIGN INTENT</text>
    
    <g transform="translate(0, 60)" line-height="1.6">
      <circle cx="6" cy="-4" r="2" fill="#c9a96e"/>
      <text x="20" y="0">共通パーツ（ヘッダー・フッター・カード）を template-parts/ 配下に分割。1ファイル修正で全ページに反映。</text>
    </g>
    <g transform="translate(0, 88)">
      <circle cx="6" cy="-4" r="2" fill="#c9a96e"/>
      <text x="20" y="0">施術メニュー・症例・お知らせはカスタム投稿タイプ化。担当者が管理画面から追加・編集できる構成に。</text>
    </g>
    <g transform="translate(0, 116)">
      <circle cx="6" cy="-4" r="2" fill="#c9a96e"/>
      <text x="20" y="0">CSS Variables で配色・余白・タイポを一元管理。ブランドリニューアル時も1ファイル調整で対応可能。</text>
    </g>
  </g>
  
  <!-- Bottom caption -->
  <text x="600" y="660" font-family="monospace" font-size="10" fill="#7a7770" letter-spacing="3" text-anchor="middle">THEME STRUCTURE · NOIR MEN&apos;S CLINIC</text>
</svg>
