<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a96e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="bg-spot" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="#0a0a0a"/>
  <rect width="1200" height="700" fill="url(#bg-spot)"/>
  
  <!-- ============ PC mockup (left) ============ -->
  <g transform="translate(80, 100)">
    <!-- Browser frame -->
    <rect x="0" y="0" width="720" height="460" rx="10" fill="#1a1612" stroke="rgba(201,169,110,0.18)" stroke-width="1"/>
    <!-- Browser bar -->
    <rect x="0" y="0" width="720" height="32" rx="10" fill="#0e0c0a"/>
    <rect x="0" y="22" width="720" height="10" fill="#0e0c0a"/>
    <circle cx="20" cy="16" r="4" fill="#3a3530"/>
    <circle cx="36" cy="16" r="4" fill="#3a3530"/>
    <circle cx="52" cy="16" r="4" fill="#3a3530"/>
    <rect x="100" y="9" width="320" height="14" rx="3" fill="#1a1612"/>
    
    <!-- Page content area -->
    <g transform="translate(0, 32)">
      <!-- Hero background image area (dark) -->
      <rect x="0" y="0" width="720" height="260" fill="#0e0c0a"/>
      
      <!-- subtle decorative gold lines -->
      <line x1="40" y1="60" x2="100" y2="60" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
      
      <!-- header nav -->
      <text x="40" y="55" font-family="serif" font-size="12" fill="#c9a96e" letter-spacing="2">NOIR</text>
      <text x="80" y="55" font-family="serif" font-size="9" fill="#7a7770" letter-spacing="2">MEN&apos;S CLINIC</text>
      
      <g font-family="sans-serif" font-size="9" fill="#b8b5ad" letter-spacing="0.5">
        <text x="380" y="56">クリニック</text>
        <text x="445" y="56">施術メニュー</text>
        <text x="520" y="56">症例</text>
        <text x="556" y="56">料金</text>
        <text x="592" y="56">FAQ</text>
        <text x="625" y="56">アクセス</text>
      </g>
      <!-- CTA button -->
      <rect x="664" y="42" width="40" height="20" rx="2" fill="#c9a96e"/>
      <text x="684" y="56" font-family="sans-serif" font-size="7" fill="#0a0a0a" text-anchor="middle">予約</text>
      
      <!-- Hero heading -->
      <text x="40" y="135" font-family="serif" font-size="36" fill="#e8e6e1" letter-spacing="-0.5">結果に、</text>
      <text x="40" y="178" font-family="serif" font-size="36" font-style="italic" fill="#c9a96e" letter-spacing="-0.5">静かな自信を。</text>
      
      <!-- Hero subtext -->
      <text x="40" y="208" font-family="sans-serif" font-size="9" fill="#b8b5ad" letter-spacing="0.5">男性のための、メディカル・エステティック。</text>
      <text x="40" y="222" font-family="sans-serif" font-size="9" fill="#b8b5ad" letter-spacing="0.5">医療脱毛・AGA・肌治療を、確かな技術と</text>
      <text x="40" y="236" font-family="sans-serif" font-size="9" fill="#b8b5ad" letter-spacing="0.5">エビデンスと、静かな配慮とともに。</text>
      
      <!-- Hero CTAs -->
      <rect x="40" y="252" width="120" height="32" rx="3" fill="#c9a96e"/>
      <text x="100" y="272" font-family="sans-serif" font-size="9" fill="#0a0a0a" text-anchor="middle">無料カウンセリング予約 →</text>
      <rect x="170" y="252" width="100" height="32" rx="3" fill="none" stroke="#c9a96e" stroke-width="0.7"/>
      <text x="220" y="272" font-family="sans-serif" font-size="9" fill="#c9a96e" text-anchor="middle">施術メニューを見る</text>
      
      <!-- Stats -->
      <g transform="translate(40, 320)">
        <text x="0" y="0" font-family="serif" font-size="22" fill="#e8e6e1">15,000</text>
        <text x="60" y="0" font-family="serif" font-size="11" fill="#c9a96e">+</text>
        <text x="0" y="14" font-family="sans-serif" font-size="8" fill="#7a7770" letter-spacing="1">年間施術実績</text>
        
        <text x="130" y="0" font-family="serif" font-size="22" fill="#e8e6e1">98</text>
        <text x="160" y="0" font-family="serif" font-size="11" fill="#c9a96e">%</text>
        <text x="130" y="14" font-family="sans-serif" font-size="8" fill="#7a7770" letter-spacing="1">お客様満足度</text>
        
        <text x="240" y="0" font-family="serif" font-size="22" fill="#e8e6e1">24</text>
        <text x="268" y="0" font-family="serif" font-size="11" fill="#c9a96e">h</text>
        <text x="240" y="14" font-family="sans-serif" font-size="8" fill="#7a7770" letter-spacing="1">予約受付</text>
      </g>
      
      <!-- bottom gold accent line -->
      <line x1="40" y1="400" x2="680" y2="400" stroke="url(#gold-grad)" stroke-width="1"/>
    </g>
    
    <!-- Label -->
    <text x="0" y="-15" font-family="monospace" font-size="10" fill="#7a7770" letter-spacing="3">PC · 1440px</text>
  </g>
  
  <!-- ============ SP mockup (right) ============ -->
  <g transform="translate(880, 100)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="220" height="460" rx="22" fill="#1a1612" stroke="rgba(201,169,110,0.18)" stroke-width="1"/>
    <!-- Notch -->
    <rect x="80" y="0" width="60" height="14" rx="7" fill="#0a0a0a"/>
    
    <!-- Page content -->
    <g transform="translate(8, 24)">
      <rect x="0" y="0" width="204" height="420" rx="14" fill="#0e0c0a"/>
      
      <!-- header -->
      <text x="14" y="22" font-family="serif" font-size="11" fill="#c9a96e" letter-spacing="2">NOIR</text>
      <line x1="178" y1="14" x2="194" y2="14" stroke="#e8e6e1" stroke-width="1"/>
      <line x1="178" y1="20" x2="194" y2="20" stroke="#e8e6e1" stroke-width="1"/>
      
      <!-- heading -->
      <text x="14" y="80" font-family="serif" font-size="20" fill="#e8e6e1">結果に、</text>
      <text x="14" y="105" font-family="serif" font-size="20" font-style="italic" fill="#c9a96e">静かな自信を。</text>
      
      <!-- subtext -->
      <text x="14" y="130" font-family="sans-serif" font-size="6.5" fill="#b8b5ad">男性のための、メディカル・エステ。</text>
      <text x="14" y="142" font-family="sans-serif" font-size="6.5" fill="#b8b5ad">医療脱毛・AGA・肌治療を確かな</text>
      <text x="14" y="154" font-family="sans-serif" font-size="6.5" fill="#b8b5ad">技術と静かな配慮とともに。</text>
      
      <!-- CTA -->
      <rect x="14" y="170" width="176" height="32" rx="3" fill="#c9a96e"/>
      <text x="102" y="190" font-family="sans-serif" font-size="9" fill="#0a0a0a" text-anchor="middle">無料カウンセリング予約 →</text>
      <rect x="14" y="210" width="176" height="32" rx="3" fill="none" stroke="#c9a96e" stroke-width="0.7"/>
      <text x="102" y="230" font-family="sans-serif" font-size="9" fill="#c9a96e" text-anchor="middle">施術メニューを見る</text>
      
      <!-- Stats grid 3 -->
      <g transform="translate(14, 280)">
        <text x="0" y="0" font-family="serif" font-size="16" fill="#e8e6e1">15,000</text>
        <text x="48" y="0" font-family="serif" font-size="9" fill="#c9a96e">+</text>
        <text x="0" y="12" font-family="sans-serif" font-size="6" fill="#7a7770" letter-spacing="1">年間施術実績</text>
      </g>
      <g transform="translate(14, 320)">
        <text x="0" y="0" font-family="serif" font-size="16" fill="#e8e6e1">98</text>
        <text x="24" y="0" font-family="serif" font-size="9" fill="#c9a96e">%</text>
        <text x="0" y="12" font-family="sans-serif" font-size="6" fill="#7a7770" letter-spacing="1">満足度</text>
      </g>
      <g transform="translate(110, 320)">
        <text x="0" y="0" font-family="serif" font-size="16" fill="#e8e6e1">24</text>
        <text x="22" y="0" font-family="serif" font-size="9" fill="#c9a96e">h</text>
        <text x="0" y="12" font-family="sans-serif" font-size="6" fill="#7a7770" letter-spacing="1">予約受付</text>
      </g>
    </g>
    
    <!-- Home indicator -->
    <rect x="80" y="450" width="60" height="3" rx="1.5" fill="#3a3530"/>
    
    <!-- Label -->
    <text x="0" y="-15" font-family="monospace" font-size="10" fill="#7a7770" letter-spacing="3">SP · 390px</text>
  </g>
  
  <!-- Bottom caption -->
  <text x="600" y="630" font-family="monospace" font-size="10" fill="#7a7770" letter-spacing="3" text-anchor="middle">DESIGN MOCKUP · NOIR MEN&apos;S CLINIC</text>
  <text x="600" y="650" font-family="serif" font-style="italic" font-size="13" fill="#b8b5ad" text-anchor="middle">Quiet Luxury — 静かな高級感</text>
</svg>
